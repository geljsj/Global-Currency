<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Global Currency Converter</title>

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GlobalCurrency">
<meta name="application-name" content="GlobalCurrency">
<meta name="theme-color" content="#007aff">

<style>
:root {
--bg:#f2f2f7;
--card:#ffffff;
--text:#000000;
--label:#8e8e93;
--input-bg:#f2f2f7;
--primary:#007aff;
}
@media(prefers-color-scheme: dark){
:root{
--bg:#000000;
--card:#1c1c1e;
--text:#ffffff;
--label:#8e8e93;
--input-bg:#2c2c2e;
}
}

/* 앱처럼 고정된 화면 설정 */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overscroll-behavior: none;
    overflow: hidden;
    position: fixed;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
}

/* 상단 여백을 넉넉하게 주어 카드를 아래로 배치 */
.top-info {
    padding: calc(60px + env(safe-area-inset-top)) 25px 40px 25px;
    display: flex;
    flex-direction: column;
}

h2 {
    font-size: 26px;
    margin: 0;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
}

.guide-text {
    font-size: 13px;
    color: var(--label);
    font-weight: 500;
    line-height: 1.5;
    margin-top: 8px;
}

.bottom-area {
    margin-top: auto;
    display: flex;
    flex-direction: column;
}

.container-card {
    /* 하단 잘림 방지를 위해 아래쪽 패딩 확보 */
    padding: 25px 20px calc(30px + env(safe-area-inset-bottom)) 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--card);
    border-top-left-radius: 40px; /* 좀 더 둥글게 */
    border-top-right-radius: 40px;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
    max-height: 70vh;
}

#inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    overflow-y: auto;
    padding: 2px;
    overscroll-behavior-y: contain;
    -webkit-overflow-scrolling: touch;
}

.input-group {
    background: var(--input-bg);
    padding: 10px 12px;
    border-radius: 16px;
    border: 2px solid transparent;
    transition: all .3s ease;
}

.input-group:focus-within {
    border-color: var(--primary);
    background: var(--card);
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

.label-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
}

.flag-icon {
    width: 16px;
    height: 12px;
    object-fit: cover;
    border-radius: 2px;
}

label {
    font-size: 9px;
    font-weight: 700;
    color: var(--label);
}

input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    outline: none;
    padding: 0;
}

.tip-container {
    display: flex;
    gap: 8px;
    margin-top: 5px;
}

.tip-btn {
    flex: 1;
    padding: 16px 0;
    border: none;
    border-radius: 18px;
    background: var(--primary);
    color: white;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s;
}

.tip-btn:active {
    transform: scale(0.95);
    opacity: 0.8;
}

.status {
    font-size: 11px;
    text-align: center;
    color: var(--label);
    font-weight: 600;
    padding-top: 8px;
}
</style>
</head>
<body>
<div class="top-info">
<h2 id="main-title">🌏 Global Currency</h2>
<div class="guide-text" id="main-guide">Loading...</div>
</div>
<div class="bottom-area">
<div class="container-card">
    <div id="inputs"></div>
    <div class="tip-container">
        <button class="tip-btn" onclick="applyTip(1.05)">+5%</button>
        <button class="tip-btn" onclick="applyTip(1.10)">+10%</button>
        <button class="tip-btn" onclick="applyTip(1.15)">+15%</button>
        <button class="tip-btn" onclick="applyTip(1.20)">+20%</button>
    </div>
    <div id="last-update" class="status">Updating...</div>
</div>
</div>

<script>
const userLang = navigator.language || navigator.userLanguage;
const isKor = userLang.startsWith('ko');

const i18n = {
    title: isKor ? "🌏 세계여행 환율 계산기" : "🌏 Global Currency",
    guide: isKor ? "금액을 입력하면 동시 변환됩니다.<br>팁 버튼으로 빠르게 계산해 보세요." : "Enter amount to convert instantly.<br>Use buttons to add tips quickly.",
    cached: isKor ? "🟡 캐시됨" : "🟡 Cached",
    updated: isKor ? "✅ 업데이트 완료" : "✅ Updated",
    offline: isKor ? "⚠️ 오프라인 모드" : "⚠️ Offline Mode"
};

document.getElementById('main-title').innerText = i18n.title;
document.getElementById('main-guide').innerHTML = i18n.guide;

const currencies=[
{code:'USD',name: isKor ? '미국' : 'United States',iso:'us'},
{code:'EUR',name: isKor ? '유로존' : 'Eurozone',iso:'eu'},
{code:'KRW',name: isKor ? '대한민국' : 'South Korea',iso:'kr'},
{code:'JPY',name: isKor ? '일본' : 'Japan',iso:'jp'},
{code:'CNY',name: isKor ? '중국' : 'China',iso:'cn'},
{code:'TRY',name: isKor ? '터키' : 'Turkey',iso:'tr'},
{code:'CZK',name: isKor ? '체코' : 'Czechia',iso:'cz'},
{code:'HUF',name: isKor ? '헝가리' : 'Hungary',iso:'hu'},
{code:'THB',name: isKor ? '태국' : 'Thailand',iso:'th'},
{code:'VND',name: isKor ? '베트남' : 'Vietnam',iso:'vn'},
{code:'PHP',name: isKor ? '필리핀' : 'Philippines',iso:'ph'},
{code:'TWD',name: isKor ? '대만' : 'Taiwan',iso:'tw'},
{code:'HKD',name: isKor ? '홍콩' : 'Hong Kong',iso:'hk'},
{code:'SGD',name: isKor ? '싱가포르' : 'Singapore',iso:'sg'}
];

let rates={};
let lastFocusedId='USD';
const baseCurrency='USD';

function renderInputs(){
const container=document.getElementById('inputs');
container.innerHTML='';
currencies.forEach(cur=>{
const group=document.createElement('div');
group.className='input-group';
group.innerHTML=`
<div class="label-wrapper">
    <img class="flag-icon" src="https://flagcdn.com/w40/${cur.iso}.png">
    <label>${cur.code} (${cur.name})</label>
</div>
<input type="text" inputmode="decimal" id="${cur.code}" placeholder="0"
oninput="handleInput('${cur.code}')"
onfocus="lastFocusedId='${cur.code}'; this.select();"
onclick="this.select()">
`;
container.appendChild(group);
});
}

async function fetchRates(){
const CACHE_KEY=`rates_v3_${baseCurrency}`;
const TIME_KEY=`time_v3_${baseCurrency}`;
const now=Date.now();
const lastFetch=localStorage.getItem(TIME_KEY);

if(lastFetch && now-lastFetch < 43200000){ // 12시간 캐시
const cached=localStorage.getItem(CACHE_KEY);
if(cached){
rates=JSON.parse(cached);
document.getElementById('last-update').innerText=`${i18n.cached}: ${new Date(parseInt(lastFetch)).toLocaleTimeString()}`;
renderInputs();
return;
}
}

try{
const res=await fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`);
const data=await res.json();
if(data.result==="success"){
rates=data.rates;
localStorage.setItem(CACHE_KEY,JSON.stringify(rates));
localStorage.setItem(TIME_KEY,now);
document.getElementById('last-update').innerText=`${i18n.updated}: ${new Date().toLocaleTimeString()}`;
}
}catch(e){
const cached=localStorage.getItem(CACHE_KEY);
if(cached) {
rates=JSON.parse(cached);
document.getElementById('last-update').innerText=i18n.offline;
}
}
renderInputs();
}

function formatCurrency(code,value){
if(value===0) return '';
const noDecimal=['KRW','JPY','VND','HUF'];
return Number(value).toLocaleString(isKor ? 'ko-KR' : 'en-US',{
minimumFractionDigits:0,
maximumFractionDigits:noDecimal.includes(code)?0:2
});
}

function handleInput(code){
const el=document.getElementById(code);
let val=el.value.replace(/,/g,'');
if(val===''||isNaN(val)){ updateAll(code,0); return; }
updateAll(code,parseFloat(val));
}

function updateAll(changedCode,val){
if(!rates[changedCode]) return;
const valInUSD=val/rates[changedCode];
currencies.forEach(c=>{
const targetEl=document.getElementById(c.code);
if(targetEl && c.code!==changedCode){
const result=valInUSD*rates[c.code];
targetEl.value=formatCurrency(c.code,result);
}
});
}

function applyTip(ratio){
const el=document.getElementById(lastFocusedId);
let val=parseFloat(el.value.replace(/,/g,''));
if(!isNaN(val)){
const tipped=val*ratio;
el.value=formatCurrency(lastFocusedId,tipped);
updateAll(lastFocusedId,tipped);
}
}

// 전체 스크롤 방지
document.addEventListener('touchmove', function (e) {
    if (e.target.closest('#inputs')) return; 
    e.preventDefault();
}, { passive: false });

fetchRates();
</script>
</body>
</html>
